<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Guide EDL Flatsy</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0D2B5E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EDL Flatsy">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap');

/* ─────────────────────────────────────────
   RESET & ROOT
───────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --flatsy:#5BC8F5;--flatsy-dark:#3BA8D4;--navy:#0D2B5E;
  --bg:#EDF1F7;--card:#fff;--text:#4A5568;--muted:#718096;
  --border:#E2E8F0;--green:#38A169;--red:#E53E3E;--amber:#F59E0B;
  --r:14px;--r-sm:10px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px)
}
html,body{
  height:100%;background:var(--bg);
  font-family:'Poppins',sans-serif;color:var(--text);
  overflow:hidden;width:100%
}
#app{
  display:flex;flex-direction:column;
  height:100%;width:100%;max-width:480px;
  margin:0 auto;position:relative
}

/* ─────────────────────────────────────────
   SCREENS
───────────────────────────────────────── */
.screen{
  display:none;flex-direction:column;flex:1;
  overflow:hidden;opacity:0;
  transition:opacity .2s ease,transform .25s ease
}
.screen.active{display:flex;opacity:1;transform:translateX(0)!important}
#screen-module,#screen-fiche-detail{transform:translateX(40px)}
#screen-home,#screen-fiches,#screen-erreurs,#screen-quiz{transform:translateY(0)}
.scroll{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:16px 16px calc(20px + var(--safe-bottom))
}

/* ─────────────────────────────────────────
   TAB BAR
───────────────────────────────────────── */
#tabbar{
  display:flex;background:var(--card);
  border-top:1px solid var(--border);
  padding-bottom:var(--safe-bottom);
  height:calc(60px + var(--safe-bottom));
  flex-shrink:0;z-index:10
}
.tab{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:3px;cursor:pointer;color:var(--muted);
  transition:.15s;padding:8px 4px
}
.tab.active{color:var(--navy)}
.tab-icon{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  transition:.15s
}
.tab.active .tab-icon{background:rgba(13,43,94,.08)}
.tab svg{width:20px;height:20px;stroke-width:2}
.tab span{font-size:11px;font-weight:700;letter-spacing:.2px}

/* ─────────────────────────────────────────
   TOP BAR
───────────────────────────────────────── */
.topbar{
  display:flex;align-items:center;
  padding:calc(14px + var(--safe-top)) 16px 12px;
  gap:10px;flex-shrink:0;
  background:var(--card);border-bottom:1px solid var(--border)
}
.topbar-back{
  width:40px;height:40px;border-radius:50%;
  background:var(--bg);border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all .15s
}
.topbar-back:active{transform:scale(.92)}
.topbar-back svg{width:20px;height:20px;stroke:var(--navy)}
.topbar-title{
  font-weight:700;font-size:17px;color:var(--navy);
  line-height:1.2;flex:1
}

/* ─────────────────────────────────────────
   HOME HEADER
───────────────────────────────────────── */
.home-header{
  background:var(--navy);
  padding:calc(18px + var(--safe-top)) 20px 20px;
  flex-shrink:0
}
.home-greeting{
  font-size:11px;font-weight:700;
  color:rgba(255,255,255,.5);
  letter-spacing:.8px;text-transform:uppercase;
  margin-bottom:4px
}
.home-title{
  font-weight:800;font-size:26px;color:white;
  line-height:1.15;margin-bottom:4px
}
.home-subtitle{font-size:13px;color:rgba(255,255,255,.6)}

/* ─────────────────────────────────────────
   NEW DESIGN SYSTEM — Section header
───────────────────────────────────────── */
.sec{
  display:flex;align-items:center;gap:8px;
  margin:20px 0 10px
}
.sec-line{flex:1;height:1px;background:var(--border)}
.sec-label{
  font-size:11px;font-weight:800;color:var(--navy);
  text-transform:uppercase;letter-spacing:.6px;
  white-space:nowrap
}
/* Legacy support */
.section-bar{
  font-weight:700;font-size:14px;color:var(--navy);
  margin:20px 0 8px;padding-left:10px;
  border-left:3px solid var(--flatsy)
}

/* ─────────────────────────────────────────
   CARDS
───────────────────────────────────────── */
.card{
  background:var(--card);border-radius:var(--r);
  padding:16px;margin-bottom:10px;
  border:1px solid var(--border);
  box-shadow:0 1px 3px rgba(0,0,0,.05),0 2px 12px rgba(0,0,0,.04)
}

/* ─────────────────────────────────────────
   MODULE CARDS (home list)
───────────────────────────────────────── */
.module-card{
  background:var(--card);border-radius:var(--r);
  padding:14px 16px;margin-bottom:8px;
  display:flex;align-items:center;gap:14px;
  cursor:pointer;border:1px solid var(--border);
  transition:all .15s;
  box-shadow:0 1px 3px rgba(0,0,0,.05),0 2px 12px rgba(0,0,0,.03)
}
.module-card:active{transform:scale(.98);box-shadow:none}
.module-icon{
  width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:20px
}
.module-info{flex:1;min-width:0}
.module-title{font-weight:700;font-size:14px;color:var(--navy);line-height:1.3}
.module-sub{font-size:12px;color:var(--muted);margin-top:2px}
.module-chevron{
  width:28px;height:28px;border-radius:8px;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0
}
.module-chevron svg{width:14px;height:14px;stroke:var(--muted)}

/* ─────────────────────────────────────────
   MODULE HEADER (inside module)
───────────────────────────────────────── */
.mod-hero{
  border-radius:var(--r);padding:18px;
  margin-bottom:16px;position:relative;overflow:hidden
}
.mod-hero-emoji{font-size:36px;display:block;margin-bottom:10px;line-height:1}
.mod-hero-title{
  font-weight:800;font-size:22px;color:var(--navy);
  line-height:1.2;margin-bottom:4px
}
.mod-hero-sub{font-size:13px;color:var(--muted)}

/* ─────────────────────────────────────────
   FICHE GRID & CARDS
───────────────────────────────────────── */
.fiche-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:10px;margin-bottom:10px
}
.fiche-card{
  background:var(--card);border-radius:var(--r);
  padding:14px;cursor:pointer;
  border:1px solid var(--border);
  transition:all .15s;
  box-shadow:0 1px 3px rgba(0,0,0,.05),0 2px 12px rgba(0,0,0,.03);
  position:relative
}
.fiche-card:active{transform:scale(.97)}
.fiche-emoji{font-size:24px;margin-bottom:6px;display:block}
.fiche-name{font-weight:700;font-size:13px;color:var(--navy);line-height:1.3}
.fiche-desc{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.4}

/* ─────────────────────────────────────────
   FICHE DETAIL HEADER
───────────────────────────────────────── */
.fiche-detail-hero{
  padding:16px;
  border-bottom:1px solid var(--border);
  margin-bottom:16px
}
.fiche-detail-hero .fiche-emoji{font-size:40px;margin-bottom:8px}
.fiche-detail-hero .fiche-name{
  font-weight:800;font-size:22px;color:var(--navy)
}
.fiche-detail-hero .fiche-desc{
  font-size:13px;color:var(--muted);margin-top:4px
}

/* ─────────────────────────────────────────
   ALERT BLOCKS
   Réservés aux VRAIS critiques uniquement.
   Pour le reste : .prose-list ou texte direct
───────────────────────────────────────── */
.info-red,.info-yellow,.info-blue,.info-green{
  border-radius:var(--r-sm);padding:11px 14px;
  margin-bottom:10px;font-size:13px;line-height:1.55;
  display:flex;gap:10px;align-items:flex-start
}
.info-red{background:#FFF0F0;border-left:3px solid #E53E3E;border-radius:0 var(--r-sm) var(--r-sm) 0}
.info-yellow{background:#FFFBEB;border-left:3px solid #F59E0B;border-radius:0 var(--r-sm) var(--r-sm) 0}
.info-blue{background:#EBF8FF;border-left:3px solid #5BC8F5;border-radius:0 var(--r-sm) var(--r-sm) 0}
.info-green{background:#F0FFF4;border-left:3px solid #38A169;border-radius:0 var(--r-sm) var(--r-sm) 0}
.info-icon{font-size:14px;flex-shrink:0;margin-top:2px;opacity:.8}
.info-body{flex:1;color:var(--text)}
.info-body strong{color:inherit;font-weight:700}

/* ─────────────────────────────────────────
   PROSE LIST — remplace les step-timeline
   et les cards à points pour info simple
───────────────────────────────────────── */
.prose-list{
  display:flex;flex-direction:column;
  gap:0;margin-bottom:12px
}
.prose-item{
  display:flex;align-items:baseline;gap:10px;
  padding:8px 0;
  border-bottom:1px solid var(--border)
}
.prose-item:last-child{border-bottom:none}
.prose-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--flatsy);flex-shrink:0;
  margin-top:5px;align-self:flex-start
}
.prose-dot.red{background:var(--red)}
.prose-dot.green{background:var(--green)}
.prose-dot.amber{background:var(--amber)}
.prose-item-body{flex:1;font-size:13px;color:var(--text);line-height:1.5}
.prose-item-body strong{font-weight:700;color:var(--navy)}
.prose-item-body em{font-style:normal;color:var(--muted);font-size:12px;display:block;margin-top:2px}

/* Variante numérotée (procédures ordonnées) */
.prose-num{
  width:22px;height:22px;border-radius:50%;
  background:var(--navy);color:white;
  font-size:11px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px
}
.prose-num.accent{background:var(--flatsy);color:var(--navy)}

/* ─────────────────────────────────────────
   STATE ROWS (Bon / Moyen / Mauvais)
───────────────────────────────────────── */
.state-row{
  display:flex;align-items:flex-start;gap:0;
  border-radius:10px;margin-bottom:6px;overflow:hidden
}
.state-row.good .state-label{background:#38A169}
.state-row.medium .state-label{background:#F59E0B}
.state-row.bad .state-label{background:#E53E3E}
.state-label{
  min-width:68px;font-size:11px;font-weight:800;
  text-transform:uppercase;letter-spacing:.3px;
  padding:9px 8px;text-align:center;color:white;
  flex-shrink:0;line-height:1.3
}
.state-text{
  font-size:12px;color:var(--text);
  line-height:1.5;font-style:italic;
  padding:9px 12px;
  background:var(--bg);flex:1
}

/* ─────────────────────────────────────────
   STEP TIMELINE — Procédures ordonnées
   Numéro visible + titre + détail optionnel
───────────────────────────────────────── */
.step-timeline{
  display:flex;flex-direction:column;
  gap:0;margin-bottom:12px
}
.step-row{
  display:flex;align-items:flex-start;
  gap:12px;padding:10px 0;
  border-bottom:1px solid var(--border)
}
.step-row:last-child{border-bottom:none}
.step-num{
  width:26px;height:26px;border-radius:50%;
  background:var(--navy);color:white;
  font-size:12px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px
}
.step-content{flex:1}
.step-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.4}
.step-detail{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4}

/* Step list (legacy compact) */
.step-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.step-item{display:flex;align-items:center;gap:10px}
.step-item .step-num{width:26px;height:26px;font-size:12px}
.step-text{font-size:13px;font-weight:600;color:var(--text)}

/* ─────────────────────────────────────────
   CHECKLIST INTERACTIVE
───────────────────────────────────────── */
.chk-list{
  background:var(--card);border-radius:var(--r);
  border:1px solid var(--border);overflow:hidden;
  margin-bottom:10px
}
.chk-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;cursor:pointer;
  border-bottom:1px solid var(--border);
  transition:.12s
}
.chk-item:last-child{border-bottom:none}
.chk-item.done{background:#F0FFF4}
.chk-box{
  width:24px;height:24px;border-radius:7px;
  border:2px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:.15s;background:var(--bg)
}
.chk-item.done .chk-box{
  background:var(--green);border-color:var(--green)
}
.chk-label{
  font-size:13px;font-weight:500;color:var(--text);
  flex:1;line-height:1.4
}
.chk-item.done .chk-label{
  color:var(--muted);text-decoration:line-through
}

/* ─────────────────────────────────────────
   PILL TAGS
───────────────────────────────────────── */
.pill-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.pill-tag{
  background:#E8ECF2;color:var(--navy);
  font-size:12px;font-weight:600;
  padding:4px 10px;border-radius:20px
}
.pill-tag.bad{background:#FEF2F2;color:var(--red)}
.pill-tag.ok{background:#EBF8FF;color:#38A169}
.pill-tag.amber{background:#FFFBEB;color:#B45309}

/* ─────────────────────────────────────────
   CODE BOX (formule à copier)
───────────────────────────────────────── */
.code-box{
  background:var(--navy);border-radius:var(--r);
  padding:16px;margin-bottom:10px;
  text-align:center;position:relative;cursor:pointer;
  transition:opacity .1s
}
.code-box:active{opacity:.85}
.code-label{
  font-size:11px;font-weight:700;
  color:rgba(255,255,255,.5);
  text-transform:uppercase;letter-spacing:.6px;
  margin-bottom:7px
}
.code-text{
  font-size:15px;font-weight:700;
  color:var(--flatsy);letter-spacing:-.2px;
  line-height:1.4
}
.code-tap{
  position:absolute;bottom:6px;right:10px;
  font-size:10px;color:rgba(255,255,255,.3)
}

/* ─────────────────────────────────────────
   COPY TOAST
───────────────────────────────────────── */
.copy-toast{
  position:fixed;bottom:calc(80px + var(--safe-bottom));
  left:50%;transform:translateX(-50%);
  background:var(--navy);color:white;
  font-family:'Poppins',sans-serif;
  font-size:13px;font-weight:600;
  padding:10px 20px;border-radius:24px;
  z-index:9999;opacity:0;
  transition:opacity .25s;pointer-events:none;
  box-shadow:0 4px 20px rgba(0,0,0,.2)
}
.copy-toast.show{opacity:1}

/* phrase-card copyable */
.phrase-card{
  background:var(--card);border-radius:var(--r);
  padding:14px 16px 24px;margin-bottom:8px;
  border:1px solid var(--border);
  box-shadow:0 1px 3px rgba(0,0,0,.05);
  position:relative;cursor:pointer
}
.phrase-card:active{opacity:.85}
.phrase-card::after{
  content:'tap = copier';
  position:absolute;bottom:6px;right:10px;
  font-size:10px;color:var(--muted);opacity:.4
}
.phrase-context{
  font-size:11px;font-weight:700;
  color:var(--muted);text-transform:uppercase;
  letter-spacing:.7px;margin-bottom:5px
}
.phrase-text{font-size:13px;color:var(--text);line-height:1.55}
.phrase-card.arrival{background:#EBF8FF;border-left:4px solid #38A169}
.phrase-card.refus{background:#FEF2F2;border-left:4px solid var(--red)}

/* ─────────────────────────────────────────
   ACCORDION
───────────────────────────────────────── */
.accord{
  border-radius:var(--r);overflow:hidden;
  border:1px solid var(--border);margin-bottom:8px;
  box-shadow:0 1px 3px rgba(0,0,0,.04)
}
.accord-head{
  padding:14px 18px;
  display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;transition:background .12s;background:var(--card)
}
.accord-head:active{background:var(--bg)}
.accord-title{font-weight:700;font-size:14px;color:var(--navy)}
.accord-arrow{
  width:24px;height:24px;border-radius:6px;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:.2s
}
.accord.open .accord-arrow{transform:rotate(180deg);background:var(--navy)}
.accord-arrow svg{width:12px;height:12px;stroke:var(--navy)}
.accord.open .accord-arrow svg{stroke:white}
.accord-body{
  max-height:0;overflow:hidden;
  padding:0 18px;background:var(--card);
  font-size:13px;color:var(--text);
  line-height:1.6;
  transition:max-height .3s ease,padding .3s ease
}
.accord.open .accord-body{max-height:3000px;padding:0 18px 16px}

/* ─────────────────────────────────────────
   MOTS INTERDITS — approche typographique
───────────────────────────────────────── */
.words-forbidden{
  display:flex;flex-wrap:wrap;gap:4px 16px;
  margin-bottom:12px;padding:0
}
.word-tag{
  font-size:13px;font-weight:600;
  color:var(--muted);
  text-decoration:line-through;
  text-decoration-color:var(--red);
  text-decoration-thickness:2px
}
.word-ok{
  font-size:13px;font-weight:600;
  color:var(--green)
}

/* ─────────────────────────────────────────
   TWO COLUMNS GOOD/BAD
───────────────────────────────────────── */
.two-cols{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.col-good,.col-bad{border-radius:12px;padding:10px 12px}
.col-good{background:#EBF8FF}
.col-bad{background:#FEF2F2}
.col-head{
  font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.3px;margin-bottom:8px
}
.col-good .col-head{color:#38A169}
.col-bad .col-head{color:var(--red)}
.col-item{
  font-size:12px;color:var(--text);
  padding:4px 0;border-bottom:1px solid rgba(0,0,0,.05);
  line-height:1.5
}
.col-item:last-child{border-bottom:none}

/* ─────────────────────────────────────────
   TABLE
───────────────────────────────────────── */
.ref-table-wrap{
  overflow-x:auto;margin-bottom:10px;
  border-radius:var(--r);border:1px solid var(--border)
}
.ref-table{
  width:100%;border-collapse:collapse;
  font-size:12px;margin-bottom:0
}
.ref-table th{
  background:var(--navy);color:white;
  font-weight:700;padding:10px 14px;
  text-align:left;font-size:12px
}
.ref-table td{padding:9px 14px;border-bottom:1px solid var(--border)}
.ref-table tr:last-child td{border-bottom:none}
.ref-table tr:nth-child(even) td{background:#F7F9FC}

/* ─────────────────────────────────────────
   SCALE NOCKEE
───────────────────────────────────────── */
.scale-row{
  display:grid;grid-template-columns:1fr 1fr 1fr 1fr;
  gap:6px;margin-bottom:10px
}
.scale-item{
  border-radius:10px;padding:10px 6px;text-align:center
}
.scale-item.neuf{background:#E8F4FF;border:1.5px solid #BEE3F8}
.scale-item.bon{background:#EBF8EE;border:1.5px solid #9AE6B4}
.scale-item.moyen{background:#FFFBEB;border:1.5px solid #F6E05E}
.scale-item.mauvais{background:#FFF5F5;border:1.5px solid #FEB2B2}
.scale-name{
  font-size:11px;font-weight:800;
  text-transform:uppercase;letter-spacing:.3px;
  margin-bottom:3px
}
.scale-item.neuf .scale-name{color:var(--navy)}
.scale-item.bon .scale-name{color:#276749}
.scale-item.moyen .scale-name{color:#92400E}
.scale-item.mauvais .scale-name{color:#C53030}
.scale-def{font-size:11px;color:var(--muted);line-height:1.3}

/* ─────────────────────────────────────────
   QUIZ
───────────────────────────────────────── */
.q-block{
  background:var(--card);border-radius:var(--r);
  padding:16px;margin-bottom:10px;
  border:1px solid var(--border)
}
.q-num{
  font-size:11px;font-weight:700;
  color:var(--flatsy-dark);text-transform:uppercase;
  letter-spacing:.4px;margin-bottom:8px
}
.q-text{
  font-size:14px;font-weight:700;
  color:var(--navy);line-height:1.45;
  margin-bottom:14px
}
.q-opt{
  padding:12px 16px;border-radius:10px;
  margin-bottom:7px;cursor:pointer;
  font-size:13px;font-weight:500;
  border:1.5px solid var(--border);
  transition:.12s;background:var(--bg);
  line-height:1.45
}
.q-opt:active{transform:scale(.98)}
.q-opt.correct{
  background:#EBF8F0;border-color:#38A169;
  color:#276749;font-weight:700
}
.q-opt.wrong{
  background:#FFF5F5;border-color:var(--red);
  color:#C53030
}
.q-opt.disabled{pointer-events:none}
.q-feedback{
  display:none;margin-top:10px;
  padding:10px 14px;
  background:#EBF8FF;border-radius:10px;
  font-size:12px;color:var(--navy);line-height:1.55;
  border-left:3px solid var(--flatsy)
}
.q-feedback.show{display:block}

.quiz-progress-wrap{padding:0 2px;margin-bottom:14px}
.quiz-progress-bar{
  height:5px;background:var(--border);
  border-radius:3px;overflow:hidden
}
.quiz-progress-fill{
  height:100%;background:var(--flatsy);
  border-radius:3px;transition:width .4s ease
}
.quiz-progress-label{
  font-size:12px;color:var(--muted);
  margin-top:5px;text-align:center
}

/* Quiz result */
.result-bar{
  width:100%;height:8px;background:var(--border);
  border-radius:4px;margin:14px 0 10px;overflow:hidden
}
.result-fill{height:100%;border-radius:4px;transition:.5s}

/* ─────────────────────────────────────────
   BUTTONS
───────────────────────────────────────── */
.btn-primary{
  display:block;width:100%;padding:13px 24px;
  background:var(--navy);color:white;
  font-weight:700;font-size:14px;border:none;
  border-radius:12px;cursor:pointer;margin-top:12px;
  font-family:inherit;
  box-shadow:0 2px 8px rgba(13,43,94,.2);
  transition:all .15s
}
.btn-primary:active{transform:scale(.98)}
.btn-secondary{
  display:block;width:100%;padding:13px 24px;
  background:transparent;color:var(--navy);
  font-weight:700;font-size:14px;
  border:1.5px solid var(--navy);
  border-radius:12px;cursor:pointer;margin-top:8px;
  font-family:inherit;transition:all .15s
}
.btn-secondary:active{background:#EBF8FF}

/* ─────────────────────────────────────────
   SEARCH
───────────────────────────────────────── */
.search-wrap{padding:12px 16px 6px;flex-shrink:0;background:var(--card);border-bottom:1px solid var(--border)}
.search-box{
  display:flex;align-items:center;gap:8px;
  background:var(--bg);border:1.5px solid var(--border);
  border-radius:12px;padding:9px 14px;transition:.15s
}
.search-box:focus-within{border-color:var(--flatsy);background:var(--card)}
.search-box input{
  flex:1;border:none;outline:none;
  font-family:inherit;font-size:14px;
  color:var(--text);background:transparent
}
.search-box input::placeholder{color:var(--muted)}
.search-box svg{width:16px;height:16px;stroke:var(--muted);flex-shrink:0}
.search-empty{text-align:center;padding:40px 16px;color:var(--muted);font-size:13px}

/* ─────────────────────────────────────────
   FILTERS PILL
───────────────────────────────────────── */
.filter-wrap{
  display:flex;gap:6px;

  background:var(--card);
  border-bottom:1px solid var(--border);

.filter-pill{

  border:1.5px solid var(--border);
  background:var(--bg);color:var(--muted);
  cursor:pointer;white-space:nowrap;
  flex-shrink:0;transition:all .15s;
  font-family:inherit
}
.filter-pill.active{
  background:var(--navy);color:white;

───────────────────────────────────────── */
.fav-btn{

  padding:0;display:flex;
  align-items:center;justify-content:center;
  border-radius:50%
}
.fav-btn svg{
  width:16px;height:16px;

}
.fav-btn.active svg{stroke:#F59E0B;fill:#F59E0B}

───────────────────────────────────────── */
.prog-badge{

.prog-badge.review{background:#FFF5F5;color:#C53030}
.prog-badge.progress{background:#FFFBEB;color:#92400E}
.prog-badge.new{background:#F1F3F6;color:var(--muted)}

.home-progress-bar-wrap{

.home-progress-track{

.home-progress-fill{

.home-progress-legend{

.home-progress-legend span{

.legend-dot{

/* ─────────────────────────────────────────

───────────────────────────────────────── */

// Structure: { modId: { attempts: N, lastScore: 0-100, wrongQi: [idx] } }
let moduleProgress = JSON.parse(localStorage.getItem('edl_progress') || '{}');
function saveProgress() { localStorage.setItem('edl_progress', JSON.stringify(moduleProgress)); }
function getModuleStatus(modId) {
  const p = moduleProgress[modId];
  if(!p || !p.attempts) return 'new';
  if(p.lastScore >= 80) return 'done';
  if(p.lastScore >= 50) return 'progress';
  return 'review';
}
function getModuleScore(modId) {
  const p = moduleProgress[modId];
  return p && p.lastScore !== undefined ? p.lastScore : null;
}
function getAdaptiveQuestions(modId, allQ) {
  const p = moduleProgress[modId];
  if(!p || !p.wrongQi || p.wrongQi.length === 0) return allQ;
  const wrong = allQ.filter((_, i) => p.wrongQi.includes(i));
  const rest  = allQ.filter((_, i) => !p.wrongQi.includes(i));
  return [...wrong, ...rest];
}
function recordModuleQuizResult(modId, answers, allQ) {
  const correct = allQ.filter((q, i) => answers[i] === q.correct).length;
  const score = Math.round(correct / allQ.length * 100);
  const wrongQi = allQ.map((q, i) => answers[i] !== q.correct ? i : null).filter(x => x !== null);
  if(!moduleProgress[modId]) moduleProgress[modId] = {};
  moduleProgress[modId].lastScore = score;
  moduleProgress[modId].wrongQi = wrongQi;
  moduleProgress[modId].attempts = (moduleProgress[modId].attempts || 0) + 1;
  saveProgress();
  return score;
}

function switchTab(tab) {
  ['home','fiches','erreurs','quiz'].forEach(t => {
    const tabEl = document.getElementById('tab-' + t);
    const scr = document.getElementById('screen-' + t);
    if(tabEl) tabEl.classList.toggle('active', t === tab);
    if(scr) scr.classList.toggle('active', t === tab);
  });
  document.getElementById('screen-module').classList.remove('active');
  document.getElementById('screen-fiche-detail').classList.remove('active');

  currentTab = tab;
  document.getElementById('tab-home').classList.toggle('active', tab === 'home');

  if(tab === 'home') renderHome();
  if(tab === 'fiches') renderFiches();
  if(tab === 'erreurs') renderErreurs();
  if(tab === 'quiz') renderQuiz();

  const activeScroll = document.querySelector('#screen-' + tab + ' .scroll');
  if(activeScroll) activeScroll.scrollTop = 0;
}

        <span class="info-body"><strong>${moduleProgress[id].wrongQi.length} question${moduleProgress[id].wrongQi.length>1?'s':''} ratée${moduleProgress[id].wrongQi.length>1?'s':''}</strong> remontée${moduleProgress[id].wrongQi.length>1?'s':''} en priorité.</span>
      </div>
    ` : '';
    quizHtml = adaptiveBanner + adaptedQ.map((q, qi) => `
      <div class="q-block" id="mq-${id}-${qi}">
        <div class="q-num">Question ${qi+1} / ${totalQ}${qi === 0 && hasWrong ? ' · 🎯 Ciblé' : ''}</div>
        <div class="q-text">${q.q}</div>
        ${q.opts.map((o,oi) => `<div class="q-opt" onclick="answerModuleQuiz(${id},${qi},${oi},${q.correct},${totalQ})">${o}</div>`).join('')}
        <div class="q-feedback" id="mq-fb-${id}-${qi}">💡 ${q.exp}</div>
      </div>
    `).join('');
  }

  const bgColor = mod.color || '#EBF8FF';
  const status = mod.quiz && mod.quiz.length > 0 ? getModuleStatus(id) : null;
  const score = getModuleScore(id);
  const heroBadge = (status && status !== 'new') ? `
    <div style="margin-top:10px">
      <span class="prog-badge ${status}" style="display:inline-flex">
        ${STATUS_ICONS[status]} ${STATUS_LABELS[status]}${score !== null ? ' · ' + score + '%' : ''}
      </span>
    </div>
  ` : '';

  scroll.innerHTML = `<div style="padding-bottom:8px">
    <div class="mod-hero" style="background:${bgColor}">
      <span class="mod-hero-emoji">${mod.emoji}</span>
      <div class="mod-hero-title">${mod.title}</div>
      <div class="mod-hero-sub">${mod.sub}</div>
      ${heroBadge}
    </div>
    ${mod.content}
  </div>`;

  const qPlaceholder = scroll.querySelector('#module-quiz-' + id);
  if(qPlaceholder && quizHtml) qPlaceholder.outerHTML = quizHtml;

  if(mod.checklist) {
    const chkDiv = scroll.querySelector('#checklist-2');
    if(chkDiv) renderChecklist(chkDiv, mod.checklist, 'mod' + id);
    const mod2Reset = scroll.querySelector('#mod2-reset-wrap');
    if(mod2Reset) renderModResetBtn(mod2Reset, mod.checklist, 'mod' + id);
  }

  document.getElementById('screen-home').classList.remove('active');
  document.getElementById('screen-module').classList.add('active');
  scroll.scrollTop = 0;
}

function openFiche(id) {
  const fiche = FICHES.find(f => f.id === id);
  if(!fiche) return;
  currentFiche = id;
  document.getElementById('fiche-topbar-title').textContent = fiche.name;
  const scroll = document.getElementById('fiche-detail-scroll');
  scroll.innerHTML = `<div style="padding-bottom:8px">
    <div class="fiche-detail-hero">
      <div class="fiche-emoji" style="font-size:40px;margin-bottom:8px">${fiche.emoji}</div>
      <div class="fiche-name" style="font-size:22px;font-weight:800">${fiche.name}</div>
      <div class="fiche-desc" style="font-size:13px;color:var(--muted);margin-top:4px">${fiche.desc}</div>
    </div>
    ${fiche.content}

  if(fiche.checklist) {
    const pbDiv = scroll.querySelector('#pb-checklist');
    if(pbDiv) renderChecklist(pbDiv, fiche.checklist, 'pb');
    const resetWrap = scroll.querySelector('#pb-reset-wrap');
    if(resetWrap) renderResetBtn(resetWrap, fiche.checklist);
  }

  document.getElementById('screen-fiches').classList.remove('active');
  document.getElementById('screen-fiche-detail').classList.add('active');
  scroll.scrollTop = 0;
}

function goBack(to) {
  const dest = to || 'home';
  document.getElementById('screen-module').classList.remove('active');
  document.getElementById('screen-fiche-detail').classList.remove('active');
  if(dest === 'fiches') {
    document.getElementById('screen-fiches').classList.add('active');
  } else {
    const scr = document.getElementById('screen-' + currentTab);
    if(scr) scr.classList.add('active');
    else document.getElementById('screen-home').classList.add('active');
  }
  if(currentTab === 'home') renderHome();
}

// CHECKLIST
// ══════════════════════════════════════════════════════════════════
function renderChecklist(container, items, storeKey) {
  const state = storeKey === 'pb' ? pbChecklistState : checklistState;
  container.innerHTML = '<div class="chk-list">' + items.map((item, i) => {
    const key = storeKey + '_' + i;
    const done = !!state[key];
    return `<div class="chk-item ${done ? 'done' : ''}" onclick="toggleChk('${storeKey}',${i},this)">
      <div class="chk-box">${done ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' : ''}</div>
      <div class="chk-label">${item}</div>
    </div>`;
  }).join('') + '</div>';
}

function toggleChk(storeKey, idx, el) {
  const state = storeKey === 'pb' ? pbChecklistState : checklistState;
  const key = storeKey + '_' + idx;
  state[key] = !state[key];
  if(storeKey === 'pb') localStorage.setItem('edl_pb_chk', JSON.stringify(pbChecklistState));
  else localStorage.setItem('edl_chk', JSON.stringify(checklistState));
  el.classList.toggle('done', !!state[key]);
  const box = el.querySelector('.chk-box');
  box.innerHTML = state[key] ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' : '';
  if(storeKey === 'pb') {
    const fiche = FICHES.find(f => f.id === 'pense-bete');
    const resetWrap = document.querySelector('#pb-reset-wrap');
    if(fiche && resetWrap) renderResetBtn(resetWrap, fiche.checklist);
  } else if(storeKey.startsWith('mod')) {
    const mod = MODULES.find(m => 'mod' + m.id === storeKey);
    const modResetWrap = document.querySelector('#mod2-reset-wrap');
    if(mod && mod.checklist && modResetWrap) renderModResetBtn(modResetWrap, mod.checklist, storeKey);
  }
}

function renderResetBtn(container, items) {
  const hasChecked = items.some((_, i) => !!pbChecklistState['pb_' + i]);
  container.innerHTML = hasChecked ? `<button onclick="resetPbChecklist()" style="display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:11px 16px;background:var(--navy);color:white;border:none;border-radius:12px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>Nouvelle mission</button>` : '';
}

function renderModResetBtn(container, items, storeKey) {
  const hasChecked = items.some((_, i) => !!checklistState[storeKey + '_' + i]);
  container.innerHTML = hasChecked ? '<button onclick="resetModChecklist(\'' + storeKey + '\')" style="display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:11px 16px;background:var(--navy);color:white;border:none;border-radius:12px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>Nouvelle mission</button>' : '';
}

function resetModChecklist(storeKey) {
  Object.keys(checklistState).forEach(k => { if(k.startsWith(storeKey + '_')) delete checklistState[k]; });
  localStorage.setItem('edl_chk', JSON.stringify(checklistState));
  const mod = MODULES.find(m => 'mod' + m.id === storeKey);
  if(mod && mod.checklist) {
    const chkDiv = document.querySelector('#checklist-2');
    if(chkDiv) renderChecklist(chkDiv, mod.checklist, storeKey);
    const resetWrap = document.querySelector('#mod2-reset-wrap');
    if(resetWrap) renderModResetBtn(resetWrap, mod.checklist, storeKey);
  }
}

function resetPbChecklist() {
  pbChecklistState = {};
  localStorage.setItem('edl_pb_chk', JSON.stringify(pbChecklistState));
  const fiche = FICHES.find(f => f.id === 'pense-bete');
  if(fiche) {
    const pbDiv = document.querySelector('#pb-checklist');
    if(pbDiv) renderChecklist(pbDiv, fiche.checklist, 'pb');
    const resetWrap = document.querySelector('#pb-reset-wrap');
    if(resetWrap) renderResetBtn(resetWrap, fiche.checklist);
  }
}

// ══════════════════════════════════════════════════════════════════
// QUIZ — Module
// ══════════════════════════════════════════════════════════════════
// ── Suivi des réponses par module quiz ──
let moduleQuizAnswers = {};

function answerModuleQuiz(modId, qi, selected, correct, totalQ) {
  const block = document.getElementById(`mq-${modId}-${qi}`);
  if(!block) return;
  // Empêcher double-réponse
  if(block.querySelector('.q-opt.correct, .q-opt.wrong')) return;
  // Stocker la réponse (clé = index original dans allQ)
  if(!moduleQuizAnswers[modId]) moduleQuizAnswers[modId] = {};
  moduleQuizAnswers[modId][qi] = selected;

  const opts = block.querySelectorAll('.q-opt');
  opts.forEach((o, i) => {
    o.classList.add('disabled');
    if(i === correct) o.classList.add('correct');
    else if(i === selected && selected !== correct) o.classList.add('wrong');
  });
  const fb = document.getElementById(`mq-fb-${modId}-${qi}`);
  if(fb) fb.classList.add('show');

  // Si toutes les questions répondues → calculer et afficher résultat
  const answered = Object.keys(moduleQuizAnswers[modId]).length;
  if(answered >= totalQ) {
    showModuleQuizResult(modId, totalQ);
  }
}

function showModuleQuizResult(modId, totalQ) {
  const mod = MODULES.find(m => m.id === modId);
  if(!mod || !mod.quiz) return;

  // Reconstituer les réponses dans l'ordre original
  const answers = {};
  Object.entries(moduleQuizAnswers[modId]).forEach(([qi, sel]) => {
    answers[parseInt(qi)] = sel;
  });

  const score = recordModuleQuizResult(modId, answers, mod.quiz);
  renderHome(); // Met à jour les badges home en fond

  const scroll = document.getElementById('module-scroll');
  const existing = scroll.querySelector('.module-quiz-result');
  if(existing) existing.remove();

  const pct = score;
  const resultDiv = document.createElement('div');
  resultDiv.className = 'card module-quiz-result';
  resultDiv.style.cssText = 'text-align:center;padding:20px 16px;margin-top:8px;border:2px solid ' + (pct>=80?'var(--green)':pct>=50?'var(--amber)':'var(--red)');
  resultDiv.innerHTML = `
    <div style="font-weight:900;font-size:48px;color:var(--navy);line-height:1">${pct}%</div>
    <div style="font-size:13px;color:var(--muted);margin:4px 0 12px">${Object.values(answers).filter((sel,i)=>sel===mod.quiz[i].correct).length} / ${totalQ} bonnes réponses</div>
    <div class="result-bar"><div class="result-fill" style="width:${pct}%;background:${pct>=80?'var(--green)':pct>=50?'var(--amber)':'var(--red)'}"></div></div>
    <div style="font-size:15px;font-weight:700;color:var(--navy);margin-bottom:${pct<80?'6px':'0'}">
      ${pct>=80?'🎉 Maîtrisé !':pct>=50?'👍 Bien, encore un peu':'📚 À retravailler'}
    </div>
    ${pct<80?`<div style="font-size:12px;color:var(--muted)">Les questions ratées remonteront en premier la prochaine fois</div>`:''}
    <button class="btn-secondary" onclick="retryModuleQuiz(${modId})" style="margin-top:12px">🔄 Refaire le quiz</button>
  `;
  scroll.appendChild(resultDiv);
  scroll.scrollTop = scroll.scrollHeight;
}

function retryModuleQuiz(modId) {
  if(moduleQuizAnswers[modId]) delete moduleQuizAnswers[modId];
  openModule(modId);
  // Scroll vers le quiz
  setTimeout(() => {
    const scroll = document.getElementById('module-scroll');
    const quiz = scroll.querySelector(`#module-quiz-${modId}`);
    if(quiz) quiz.scrollIntoView({behavior:'smooth',block:'start'});
  }, 100);
}

// ══════════════════════════════════════════════════════════════════
// QUIZ — Main
// ══════════════════════════════════════════════════════════════════
function answerQuiz(qi, selected, correct) {
  if(quizAnswers[qi] !== undefined) return;
  quizAnswers[qi] = selected;
  const block = document.getElementById('q-' + qi);
  if(!block) return;
  const opts = block.querySelectorAll('.q-opt');
  opts.forEach((o, i) => {
    o.classList.add('disabled');
    if(i === correct) o.classList.add('correct');
    else if(i === selected && selected !== correct) o.classList.add('wrong');
  });
  const fb = document.getElementById('qfb-' + qi);
  if(fb) fb.classList.add('show');
  updateQuizProgress();
  if(Object.keys(quizAnswers).length === QUIZ_QUESTIONS.length) showQuizResult();
}

function showQuizResult() {
  const score = QUIZ_QUESTIONS.filter((q, i) => quizAnswers[i] === q.correct).length;
  const pct = Math.round(score / QUIZ_QUESTIONS.length * 100);
  document.getElementById('quiz-subtitle').textContent = `Score : ${score}/${QUIZ_QUESTIONS.length} · ${pct}%`;
  const scroll = document.getElementById('quiz-scroll');
  const resultDiv = document.createElement('div');
  resultDiv.className = 'card';
  resultDiv.style.cssText = 'text-align:center;padding:24px 16px;margin-top:8px';
  resultDiv.innerHTML = `
    <div style="font-family:'Poppins',sans-serif;font-weight:900;font-size:56px;color:var(--navy);line-height:1">${score}/${QUIZ_QUESTIONS.length}</div>
    <div style="font-size:13px;color:var(--muted);margin-top:6px;margin-bottom:14px">${pct}% de bonnes réponses</div>
    <div class="result-bar"><div class="result-fill" style="width:${pct}%;background:${pct >= 80 ? 'var(--green)' : pct >= 60 ? 'var(--amber)' : 'var(--red)'}"></div></div>
    <div style="font-size:16px;font-weight:700;color:var(--navy)">${pct >= 80 ? '🎉 Excellent !' : pct >= 60 ? '👍 Bien, quelques révisions' : '📚 Revoyez les fiches'}</div>
    <button class="btn-primary" onclick="resetQuiz()">🔄 Recommencer le quiz</button>
    <button class="btn-secondary" onclick="switchTab('fiches')">📖 Revoir les fiches</button>
  `;
  scroll.appendChild(resultDiv);
  scroll.scrollTop = scroll.scrollHeight;
}

function resetQuiz() {
  quizAnswers = {};
  renderQuiz();
}

function resetAllProgress() {
  if(!confirm('Réinitialiser toute ta progression ? Les scores et questions ciblées seront effacés.')) return;
  moduleProgress = {};
  moduleQuizAnswers = {};
  saveProgress();
  renderHome();
}

// COPY TO CLIPBOARD
// ══════════════════════════════════════════════════════════════════
function copyText(el) {
  const txt = el.querySelector('.phrase-text, .code-text');
  if(!txt) return;
  const raw = txt.textContent.replace(/^\"|\"$/g, '').trim();
  navigator.clipboard.writeText(raw).then(() => {
    const toast = document.getElementById('copy-toast');
    toast.textContent = '✓ Copié !';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1200);
  });
}

function renderHome() {
  const scroll = document.getElementById('home-scroll');

  // Calcul progression globale
  const total = MODULES.filter(m => m.quiz && m.quiz.length > 0).length;
  const done  = MODULES.filter(m => m.quiz && m.quiz.length > 0 && getModuleStatus(m.id) === 'done').length;
  const inProg= MODULES.filter(m => m.quiz && m.quiz.length > 0 && getModuleStatus(m.id) === 'progress').length;
  const review= MODULES.filter(m => m.quiz && m.quiz.length > 0 && getModuleStatus(m.id) === 'review').length;
  const pct   = Math.round(done / total * 100);

  const progressHtml = `
    <div class="home-progress">
      <div class="home-progress-header">
        <div class="home-progress-title">Progression</div>
        <div class="home-progress-count">${done} / ${total} modules maîtrisés</div>
      </div>
      <div class="home-progress-bar-wrap">
        <div class="home-progress-track">
          <div class="home-progress-fill" style="width:${pct}%"></div>
        </div>

          <span><span class="legend-dot" style="background:#38A169"></span>Maîtrisé (${done})</span>
          <span><span class="legend-dot" style="background:#F59E0B"></span>En cours (${inProg})</span>
          <span><span class="legend-dot" style="background:#E53E3E"></span>À revoir (${review})</span>
        </div>
        ${done + inProg + review > 0 ? `<button onclick="resetAllProgress()" style="margin-top:12px;width:100%;padding:9px;background:transparent;border:1px solid var(--border);border-radius:10px;font-family:inherit;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:.15s" onmouseover="this.style.borderColor='var(--red)';this.style.color='var(--red)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">Réinitialiser ma progression</button>` : ''}
      </div>
    </div>
  `;

  const modulesHtml = MODULES.map(m => {
    const status = m.quiz && m.quiz.length > 0 ? getModuleStatus(m.id) : null;
    const score  = getModuleScore(m.id);
    const badgeHtml = status ? `
      <div class="prog-badge ${status}">
        ${STATUS_ICONS[status]} ${STATUS_LABELS[status]}${score !== null ? ' · ' + score + '%' : ''}
      </div>
    ` : '';

    return `
      <div class="module-card" onclick="openModule(${m.id})">
        <div class="module-icon" style="background:${m.color || '#EBF8FF'}">${m.emoji}</div>
        <div class="module-info">
          <div class="module-title">${m.title}</div>
          <div class="module-sub">${m.sub}</div>
        </div>
        ${badgeHtml}
      </div>
    `;
  }).join('');

  scroll.innerHTML = progressHtml + modulesHtml;
}

}

function renderQuiz() {
  quizAnswers = {};
  const scroll = document.getElementById('quiz-scroll');
  scroll.innerHTML = `
    <div style="padding:16px 0 0">
      <div class="quiz-progress-wrap">
        <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quiz-prog-fill" style="width:0%"></div></div>
        <div class="quiz-progress-label" id="quiz-prog-label">0 / ${QUIZ_QUESTIONS.length} répondu</div>
      </div>
      <div class="info-blue" style="margin-bottom:14px"><span class="info-icon">💡</span><span class="info-body">Répondez à toutes les questions pour voir votre score. Réponses expliquées après chaque question.</span></div>
      ${QUIZ_QUESTIONS.map((q, qi) => `
        <div class="q-block" id="q-${qi}">
          <div class="q-num">Question ${qi+1} / ${QUIZ_QUESTIONS.length}</div>
          <div class="q-text">${q.q}</div>
          ${q.opts.map((o, oi) => `<div class="q-opt" onclick="answerQuiz(${qi},${oi},${q.correct})">${o}</div>`).join('')}
          <div class="q-feedback" id="qfb-${qi}">💡 ${q.exp}</div>
        </div>
      `).join('')}
    </div>
  `;
  document.getElementById('quiz-subtitle').textContent = `${QUIZ_QUESTIONS.length} questions · Testez vos connaissances`;
}

function updateQuizProgress() {
  const answered = Object.keys(quizAnswers).length;
  const total = QUIZ_QUESTIONS.length;
  const pct = Math.round(answered / total * 100);
  const fill = document.getElementById('quiz-prog-fill');
  const label = document.getElementById('quiz-prog-label');
  if(fill) fill.style.width = pct + '%';
  if(label) label.textContent = answered + ' / ' + total + ' répondu' + (answered > 1 ? 'es' : '');
}

// ══════════════════════════════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════════════════════════════
function filterFiches(query) {
  const q = query.toLowerCase().trim();
  const clearBtn = document.getElementById('search-clear');
  if(clearBtn) clearBtn.style.display = q ? 'block' : 'none';

  const scroll = document.getElementById('fiches-scroll');
  if(!q) { renderFiches(); return; }

  const words = q.split(' ').filter(w => w.length > 0);

  const ficheResults = FICHES.filter(f => {
    const text = (f.name + ' ' + f.desc + ' ' + f.content.replace(/<[^>]+>/g, ' ')).toLowerCase();
    return words.every(word => text.includes(word));
  });

  const guideResults = MODULES.filter(m => {
    const text = (m.title + ' ' + m.sub + ' ' + m.desc + ' ' + m.content.replace(/<[^>]+>/g, ' ')).toLowerCase();
    return words.every(word => text.includes(word));
  });

  const erreurResults = ERREURS_CONTENT.filter((e, i) => {
    const text = (e.title + ' ' + e.body.replace(/<[^>]+>/g, ' ')).toLowerCase();
    return words.every(word => text.includes(word));
  }).map((e, i) => ({...e, _idx: i, _type: 'erreur'}));

  const regleResults = REGLES_CONTENT.filter((e, i) => {
    const text = (e.title + ' ' + e.body.replace(/<[^>]+>/g, ' ')).toLowerCase();
    return words.every(word => text.includes(word));
  }).map((e, i) => ({...e, _idx: i, _type: 'regle'}));

  const totalResults = ficheResults.length + guideResults.length + erreurResults.length + regleResults.length;

  if(totalResults === 0) {
    scroll.innerHTML = '<div class="search-empty"><div style="font-size:32px;margin-bottom:8px">🔍</div><div style="font-weight:700;color:var(--navy);margin-bottom:4px">Aucun résultat</div><div>Essayez "joints", "compteur", "signature"…</div></div>';
    return;
  }

  let html = '<div style="padding:14px 0 0">';
  html += '<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">' + totalResults + ' résultat' + (totalResults > 1 ? 's' : '') + '</div>';

  if(guideResults.length > 0) {
    html += '<div style="font-size:11px;font-weight:800;color:var(--flatsy-dark);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Guides</div>';
    html += guideResults.map(m => '<div class="module-card" onclick="openModule(' + m.id + ')"><div class="module-icon" style="background:' + (m.color||'#EBF8FF') + '">' + m.emoji + '</div><div class="module-info"><div class="module-title">' + m.title + '</div><div class="module-sub">' + m.sub + '</div></div><div class="module-chevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></div></div>').join('');
  }

  if(ficheResults.length > 0) {
    html += '<div style="font-size:11px;font-weight:800;color:var(--flatsy-dark);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 8px">Fiches</div>';
    html += '<div class="fiche-grid">' + ficheResults.map(f => ficheCardHtml(f)).join('') + '</div>';
  }

  if(erreurResults.length > 0 || regleResults.length > 0) {
    html += '<div style="font-size:11px;font-weight:800;color:var(--flatsy-dark);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 8px">Règles</div>';
    var allRules = erreurResults.concat(regleResults);
    html += allRules.map(function(e) {
      return '<div class="accord"><div class="accord-head" onclick="toggleAccord(this.parentElement)"><div class="accord-title">' + e.title + '</div><div class="accord-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg></div></div><div class="accord-body">' + e.body + '</div></div>';
    }).join('');
  }

  html += '</div>';
  scroll.innerHTML = html;
}

function clearSearch() {
  const input = document.getElementById('fiches-search');
  if(input) { input.value = ''; input.focus(); }
  filterFiches('');
}
